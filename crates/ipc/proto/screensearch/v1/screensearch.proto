syntax = "proto3";

package screensearch.v1;

message RequestEnvelope {
  string request_id = 1;
  oneof body {
    HealthRequest health = 10;
    CaptureRequest capture = 11;
    ProcessJobsRequest process_jobs = 12;
    SearchRequest search = 13;
    GetCaptureAssetRequest get_capture_asset = 14;
    SetCapturePausedRequest set_capture_paused = 15;
    GetArchiveSettingsRequest get_archive_settings = 16;
    UpdateArchiveSettingsRequest update_archive_settings = 17;
    DeleteCapturesRequest delete_captures = 18;
    ListGenerationModelsRequest list_generation_models = 19;
    ImportLocalGenerationModelRequest import_local_generation_model = 20;
    DownloadGenerationModelRequest download_generation_model = 21;
    SelectGenerationModelRequest select_generation_model = 22;
    DeleteGenerationModelRequest delete_generation_model = 23;
    UnloadGenerationModelRequest unload_generation_model = 24;
    AutomationStatusRequest automation_status = 25;
    SetAutomationEnabledRequest set_automation_enabled = 26;
    GetAutomationForegroundTargetRequest get_automation_foreground_target = 27;
    ApproveAutomationRequest approve_automation = 28;
    ExecuteAutomationRequest execute_automation = 29;
    AbortAutomationRequest abort_automation = 30;
    ResetAutomationAbortRequest reset_automation_abort = 31;
    AutomationSafetyHeartbeatRequest automation_safety_heartbeat = 32;
    WorkerHealthRequest worker_health = 100;
    WorkerOcrRequest worker_ocr = 101;
    WorkerEmbeddingRequest worker_embedding = 102;
    WorkerGenerationRequest worker_generation = 103;
    WorkerUnloadRequest worker_unload = 104;
  }
}

message ResponseEnvelope {
  string request_id = 1;
  bool terminal = 2;
  oneof body {
    HealthResponse health = 10;
    CaptureResponse capture = 11;
    ProcessJobsResponse process_jobs = 12;
    SearchEvent search = 13;
    ErrorResponse error = 14;
    CaptureAssetResponse capture_asset = 15;
    SetCapturePausedResponse set_capture_paused = 16;
    ArchiveSettingsResponse archive_settings = 17;
    UpdateArchiveSettingsResponse update_archive_settings = 18;
    DeleteCapturesResponse delete_captures = 19;
    GenerationModelsResponse generation_models = 20;
    GenerationModelResponse generation_model = 21;
    DeleteGenerationModelResponse delete_generation_model = 22;
    UnloadGenerationModelResponse unload_generation_model = 23;
    AutomationStatusResponse automation_status = 25;
    SetAutomationEnabledResponse set_automation_enabled = 26;
    AutomationForegroundTargetResponse automation_foreground_target = 27;
    ApproveAutomationResponse approve_automation = 28;
    ExecuteAutomationResponse execute_automation = 29;
    AbortAutomationResponse abort_automation = 30;
    ResetAutomationAbortResponse reset_automation_abort = 31;
    AutomationSafetyHeartbeatResponse automation_safety_heartbeat = 32;
    WorkerHealthResponse worker_health = 100;
    WorkerOcrResponse worker_ocr = 101;
    WorkerEmbeddingResponse worker_embedding = 102;
    WorkerGenerationEvent worker_generation = 103;
    WorkerUnloadResponse worker_unload = 104;
  }
}

message HealthRequest {}

message HealthResponse {
  string version = 1;
  string status = 2;
  bool capture_paused = 3;
  string capture_state = 4;
  uint64 queue_depth = 5;
  uint64 oldest_pending_age_seconds = 6;
  uint64 retry_count = 7;
  uint64 dead_letter_count = 8;
  uint64 queue_high_water = 9;
  uint64 capture_count = 10;
  uint64 asset_bytes = 11;
  uint64 ocr_block_count = 12;
  uint64 search_chunk_count = 13;
}

message SetCapturePausedRequest {
  bool paused = 1;
}

message SetCapturePausedResponse {
  bool paused = 1;
}

message GetArchiveSettingsRequest {}

message ArchiveSettingsResponse {
  optional uint32 retention_days = 1;
  optional uint64 disk_budget_bytes = 2;
  repeated string excluded_applications = 3;
  repeated string excluded_titles = 4;
  uint64 capture_count = 5;
  uint64 asset_bytes = 6;
}

message UpdateArchiveSettingsRequest {
  optional uint32 retention_days = 1;
  optional uint64 disk_budget_bytes = 2;
  repeated string excluded_applications = 3;
  repeated string excluded_titles = 4;
}

message UpdateArchiveSettingsResponse {
  ArchiveSettingsResponse settings = 1;
  uint64 captures_deleted = 2;
  uint64 assets_scheduled = 3;
}

message DeleteCapturesRequest {
  repeated string capture_ids = 1;
  string before = 2;
  bool delete_all = 3;
  bool confirmed = 4;
}

message DeleteCapturesResponse {
  uint64 captures_deleted = 1;
  uint64 assets_scheduled = 2;
}

message CaptureRequest {}

message CaptureResponse {
  string capture_id = 1;
  bool duplicate = 2;
  string skipped_reason = 3;
}

message ProcessJobsRequest {
  uint32 maximum = 1;
}

message ProcessJobsResponse {
  uint32 processed = 1;
}

message SearchRequest {
  string query = 1;
  uint32 limit = 2;
  bool generate_answer = 3;
}

message SearchEvent {
  oneof event {
    Citation citation = 1;
    Token token = 2;
    SearchCompleted completed = 3;
  }
}

message Citation {
  string capture_id = 1;
  string chunk_id = 2;
  string excerpt = 3;
  double score = 4;
  string captured_at = 5;
  string application = 6;
  string window_title = 7;
  uint32 width = 8;
  uint32 height = 9;
  repeated NormalizedRect bounds = 10;
  string match_kind = 11;
  string ocr_model_id = 12;
  string embedding_model_id = 13;
}

message NormalizedRect {
  float x = 1;
  float y = 2;
  float width = 3;
  float height = 4;
}

message GetCaptureAssetRequest {
  string capture_id = 1;
}

message CaptureAssetResponse {
  string capture_id = 1;
  string media_type = 2;
  bytes content = 3;
}

message Token {
  string text = 1;
}

message SearchCompleted {
  uint32 citation_count = 1;
  string answer_status = 2;
  string answer_message = 3;
}

message ErrorResponse {
  string code = 1;
  string message = 2;
  bool retryable = 3;
}

message ListGenerationModelsRequest {}

message ImportLocalGenerationModelRequest {
  string source_path = 1;
  string display_name = 2;
  bool select = 3;
}

message DownloadGenerationModelRequest {
  string repository = 1;
  string filename = 2;
  string display_name = 3;
  bool select = 4;
}

message SelectGenerationModelRequest {
  string model_id = 1;
}

message DeleteGenerationModelRequest {
  string model_id = 1;
}

message UnloadGenerationModelRequest {}

message GenerationModelsResponse {
  repeated GenerationModel models = 1;
}

message GenerationModelResponse {
  GenerationModel model = 1;
}

message DeleteGenerationModelResponse {
  bool deleted = 1;
}

message UnloadGenerationModelResponse {
  bool unloaded = 1;
}

message AutomationStatusRequest {}

message AutomationStatusResponse {
  bool enabled = 1;
  bool abort_available = 2;
  bool abort_active = 3;
  bool running = 4;
}

message SetAutomationEnabledRequest {
  bool enabled = 1;
}

message SetAutomationEnabledResponse {
  AutomationStatusResponse status = 1;
}

message GetAutomationForegroundTargetRequest {}

message AutomationForegroundTargetResponse {
  AutomationTarget target = 1;
}

message ApproveAutomationRequest {
  AutomationPlanV1 plan = 1;
}

message ApproveAutomationResponse {
  string approval_id = 1;
  string expires_at = 2;
  uint32 action_count = 3;
}

message ExecuteAutomationRequest {
  string approval_id = 1;
  AutomationPlanV1 plan = 2;
}

message ExecuteAutomationResponse {
  string status = 1;
}

message AbortAutomationRequest {}

message AbortAutomationResponse {
  bool abort_active = 1;
}

message ResetAutomationAbortRequest {}

message ResetAutomationAbortResponse {
  bool abort_active = 1;
}

message AutomationSafetyHeartbeatRequest {
  bool abort_registered = 1;
}

message AutomationSafetyHeartbeatResponse {
  bool accepted = 1;
}

message AutomationPlanV1 {
  AutomationTarget target = 1;
  repeated AutomationAction actions = 2;
}

message AutomationTarget {
  uint32 process_id = 1;
  uint64 window_handle = 2;
  string executable_name = 3;
  string display_title = 4;
}

message AutomationAction {
  oneof action {
    UiaInvokeAction uia_invoke = 1;
    UiaSetValueAction uia_set_value = 2;
    AutomationKeyChord key_chord = 3;
    TypeTextAction type_text = 4;
  }
}

message UiaInvokeAction {
  string automation_id = 1;
}

message UiaSetValueAction {
  string automation_id = 1;
  string value = 2;
}

message AutomationKeyChord {
  repeated AutomationKeyModifier modifiers = 1;
  AutomationKey key = 2;
}

message TypeTextAction {
  string text = 1;
}

enum AutomationKeyModifier {
  AUTOMATION_KEY_MODIFIER_UNSPECIFIED = 0;
  AUTOMATION_KEY_MODIFIER_CONTROL = 1;
  AUTOMATION_KEY_MODIFIER_ALT = 2;
  AUTOMATION_KEY_MODIFIER_SHIFT = 3;
}

enum AutomationKey {
  AUTOMATION_KEY_UNSPECIFIED = 0;
  AUTOMATION_KEY_A = 1;
  AUTOMATION_KEY_B = 2;
  AUTOMATION_KEY_C = 3;
  AUTOMATION_KEY_D = 4;
  AUTOMATION_KEY_E = 5;
  AUTOMATION_KEY_F = 6;
  AUTOMATION_KEY_G = 7;
  AUTOMATION_KEY_H = 8;
  AUTOMATION_KEY_I = 9;
  AUTOMATION_KEY_J = 10;
  AUTOMATION_KEY_K = 11;
  AUTOMATION_KEY_L = 12;
  AUTOMATION_KEY_M = 13;
  AUTOMATION_KEY_N = 14;
  AUTOMATION_KEY_O = 15;
  AUTOMATION_KEY_P = 16;
  AUTOMATION_KEY_Q = 17;
  AUTOMATION_KEY_R = 18;
  AUTOMATION_KEY_S = 19;
  AUTOMATION_KEY_T = 20;
  AUTOMATION_KEY_U = 21;
  AUTOMATION_KEY_V = 22;
  AUTOMATION_KEY_W = 23;
  AUTOMATION_KEY_X = 24;
  AUTOMATION_KEY_Y = 25;
  AUTOMATION_KEY_Z = 26;
  AUTOMATION_KEY_DIGIT_0 = 27;
  AUTOMATION_KEY_DIGIT_1 = 28;
  AUTOMATION_KEY_DIGIT_2 = 29;
  AUTOMATION_KEY_DIGIT_3 = 30;
  AUTOMATION_KEY_DIGIT_4 = 31;
  AUTOMATION_KEY_DIGIT_5 = 32;
  AUTOMATION_KEY_DIGIT_6 = 33;
  AUTOMATION_KEY_DIGIT_7 = 34;
  AUTOMATION_KEY_DIGIT_8 = 35;
  AUTOMATION_KEY_DIGIT_9 = 36;
  AUTOMATION_KEY_ENTER = 37;
  AUTOMATION_KEY_ESCAPE = 38;
  AUTOMATION_KEY_TAB = 39;
  AUTOMATION_KEY_SPACE = 40;
  AUTOMATION_KEY_BACKSPACE = 41;
  AUTOMATION_KEY_DELETE = 42;
  AUTOMATION_KEY_ARROW_LEFT = 43;
  AUTOMATION_KEY_ARROW_RIGHT = 44;
  AUTOMATION_KEY_ARROW_UP = 45;
  AUTOMATION_KEY_ARROW_DOWN = 46;
  AUTOMATION_KEY_HOME = 47;
  AUTOMATION_KEY_END = 48;
  AUTOMATION_KEY_F1 = 49;
  AUTOMATION_KEY_F2 = 50;
  AUTOMATION_KEY_F3 = 51;
  AUTOMATION_KEY_F4 = 52;
  AUTOMATION_KEY_F5 = 53;
  AUTOMATION_KEY_F6 = 54;
  AUTOMATION_KEY_F7 = 55;
  AUTOMATION_KEY_F8 = 56;
  AUTOMATION_KEY_F9 = 57;
  AUTOMATION_KEY_F10 = 58;
  AUTOMATION_KEY_F11 = 59;
  AUTOMATION_KEY_F12 = 60;
}

message GenerationModel {
  string id = 1;
  string display_name = 2;
  string source = 3;
  string repository = 4;
  string filename = 5;
  string relative_path = 6;
  string content_hash = 7;
  uint64 byte_length = 8;
  string architecture = 9;
  string quantization = 10;
  uint32 context_tokens = 11;
  bool supports_vision = 12;
  bool active = 13;
}

message WorkerHealthRequest {}

message WorkerHealthResponse {
  string status = 1;
  string active_generation_model_id = 2;
  bool generation_loaded = 3;
}

message WorkerOcrRequest {
  string asset_relative_path = 1;
  string media_type = 2;
}

message WorkerOcrResponse {
  string model_id = 1;
  repeated WorkerOcrBlock blocks = 2;
}

message WorkerOcrBlock {
  uint32 reading_order = 1;
  NormalizedRect bounds = 2;
  string text = 3;
  optional float confidence = 4;
  string language = 5;
}

message WorkerEmbeddingRequest {
  string text = 1;
}

message WorkerEmbeddingResponse {
  string model_id = 1;
  uint32 dimensions = 2;
  repeated float vector = 3;
}

message WorkerGenerationRequest {
  string model_id = 1;
  string model_relative_path = 2;
  string prompt = 3;
}

message WorkerGenerationEvent {
  oneof event {
    Token token = 1;
    WorkerGenerationCompleted completed = 2;
  }
}

message WorkerGenerationCompleted {
  string status = 1;
}

message WorkerUnloadRequest {}

message WorkerUnloadResponse {
  bool unloaded = 1;
}
